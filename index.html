<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitación A & L</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root{
      --paper-1:#fffdfa;
      --paper-2:#f6efe6;
      --paper-3:#ece0d0;
      --paper-4:#e2d2bf;
      --wine-1:#b5232f;
      --wine-2:#941a25;
      --wine-3:#74121b;
      --gold-1:#ead6ab;
      --gold-2:#c9a86b;
      --gold-3:#9d7433;
      --shadow: rgba(28,16,13,.30);
      --text: #fff8f1;
    }

    html, body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family: Arial, sans-serif;
      background:#1a120f;
    }

    .scene{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      perspective:2200px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      background:#1a120f;
    }

    .bg, .overlay{
      position:absolute;
      inset:0;
    }

    .bg{ z-index:1; }
    .bg img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transform:scale(1.02);
    }

    .overlay{
      z-index:2;
      background:
        linear-gradient(180deg, rgba(255,248,241,.12) 0%, rgba(255,248,241,.04) 26%, rgba(19,10,8,.18) 100%),
        radial-gradient(circle at top, rgba(255,255,255,.14), transparent 26%);
      pointer-events:none;
    }

    .top{
      position:absolute;
      top:28px;
      left:50%;
      transform:translateX(-50%);
      z-index:20;
      width:min(92vw, 560px);
      text-align:center;
      color:var(--text);
      text-shadow:0 4px 14px rgba(0,0,0,.28);
    }

    .top .small{
      font-size:12px;
      letter-spacing:.26em;
      text-transform:uppercase;
      margin-bottom:10px;
      opacity:.94;
    }

    .top .big{
      font-family:"Times New Roman", Times, serif;
      font-size:38px;
      letter-spacing:.18em;
    }

    .mail{
      position:relative;
      z-index:10;
      width:min(99vw, 820px);
      height:500px;
      margin-bottom:12px;
      filter:drop-shadow(0 30px 40px var(--shadow));
    }

    .mail-glow{
      position:absolute;
      left:50%;
      bottom:-16px;
      transform:translateX(-50%);
      width:88%;
      height:74px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,239,215,.42), rgba(255,239,215,0) 74%);
      filter:blur(20px);
      opacity:.82;
    }

    .envelope{
      position:absolute;
      inset:0;
    }

    .back{
      position:absolute;
      inset:24px 0 0 0;
      border-radius:34px 34px 42px 42px;
      overflow:hidden;
      z-index:1;
      background:linear-gradient(180deg, var(--paper-1), var(--paper-2) 48%, var(--paper-3) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.80),
        inset 0 -12px 16px rgba(163,133,98,.18);
    }

    .back::before{
      content:"";
      position:absolute;
      inset:18px 18px 18px 18px;
      border-radius:28px 28px 36px 36px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,.06) 42%, rgba(0,0,0,.02)),
        linear-gradient(90deg, rgba(255,255,255,.14), rgba(255,255,255,0) 16%, rgba(255,255,255,0) 84%, rgba(255,255,255,.10));
      box-shadow: inset 0 0 0 1px rgba(214,191,154,.55);
    }

    .back::after{
      content:"";
      position:absolute;
      left:34px;
      right:34px;
      top:20px;
      height:98px;
      border-radius:22px 22px 0 0;
      background:linear-gradient(180deg, rgba(255,255,255,.48), rgba(255,255,255,0));
      pointer-events:none;
    }

    .band-left, .band-right{
      position:absolute;
      top:52px;
      bottom:34px;
      width:14px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.02)),
                 linear-gradient(180deg, #caa96a, #b58c4a 50%, #8f672e);
      z-index:8;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.35),
        0 0 0 1px rgba(123,89,40,.08);
      opacity:.85;
    }

    .band-left{ left:108px; }
    .band-right{ right:108px; }

    .flap{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:250px;
      clip-path:polygon(0 0, 50% 100%, 100% 0);
      background:
        linear-gradient(180deg, var(--paper-1), #f4ebdf 52%, #e8d9c5 100%);
      transform-origin:top center;
      transition:transform 1s cubic-bezier(.22,.8,.2,1);
      z-index:11;
      backface-visibility:hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.82),
        0 8px 16px rgba(0,0,0,.06);
    }

    .flap::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,0) 28%),
        linear-gradient(90deg, rgba(212,187,146,.18), rgba(212,187,146,0) 18%, rgba(212,187,146,0) 82%, rgba(212,187,146,.18));
      pointer-events:none;
    }

    .shoulder-left, .shoulder-right, .front-left, .front-right, .front-center{
      position:absolute;
      bottom:0;
    }

    .shoulder-left, .shoulder-right{
      top:44px;
      width:180px;
      height:138px;
      background:linear-gradient(180deg, #f9f3eb, #efdfcb);
      z-index:2;
    }

    .shoulder-left{
      left:0;
      clip-path:polygon(0 0, 100% 0, 44% 100%, 0 100%);
      border-top-left-radius:30px;
    }

    .shoulder-right{
      right:0;
      clip-path:polygon(0 0, 100% 0, 100% 100%, 56% 100%);
      border-top-right-radius:30px;
    }

    .front-left{
      left:0;
      width:50%;
      height:246px;
      clip-path:polygon(0 0, 100% 100%, 0 100%);
      background:linear-gradient(180deg, var(--paper-1), #ecddcb 100%);
      border-bottom-left-radius:42px;
      z-index:4;
    }

    .front-right{
      right:0;
      width:50%;
      height:246px;
      clip-path:polygon(100% 0, 100% 100%, 0 100%);
      background:linear-gradient(180deg, #faf4ec, #e7d7c4 100%);
      border-bottom-right-radius:42px;
      z-index:4;
    }

    .front-center{
      left:0;
      right:0;
      height:210px;
      clip-path:polygon(0 0, 50% 78%, 100% 0, 100% 100%, 0 100%);
      background:linear-gradient(180deg, #fffdfa, #efe1cf 100%);
      border-bottom-left-radius:42px;
      border-bottom-right-radius:42px;
      z-index:7;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.88),
        inset 0 -8px 12px rgba(189,160,124,.10);
    }

    .seal{
      position:absolute;
      left:50%;
      top:162px;
      transform:translateX(-50%) rotate(-2deg);
      width:112px;
      height:112px;
      border-radius:44% 56% 50% 50% / 49% 45% 55% 51%;
      z-index:13;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 26% 22%, rgba(255,255,255,.46), rgba(255,255,255,0) 14%),
        radial-gradient(circle at 38% 34%, rgba(255,176,176,.14), rgba(255,176,176,0) 18%),
        radial-gradient(circle at 72% 76%, rgba(72,4,9,.62), rgba(72,4,9,0) 30%),
        radial-gradient(circle at 50% 46%, #d32a34 0%, #bc1d29 36%, #a61420 58%, #8a0f18 78%, #6d0910 100%);
      border:2px solid rgba(102, 7, 13, .82);
      box-shadow:
        0 18px 32px rgba(86,8,14,.46),
        0 4px 10px rgba(0,0,0,.12),
        inset 0 3px 4px rgba(255,255,255,.24),
        inset 0 -12px 18px rgba(83,7,12,.48);
      transition:transform .7s ease, opacity .45s ease;
      overflow:visible;
    }

    .seal::before{
      content:"";
      position:absolute;
      inset:-6px;
      border-radius:46% 54% 48% 52% / 45% 49% 51% 55%;
      background:
        radial-gradient(circle at 50% 50%, rgba(126, 12, 19, .10), rgba(126, 12, 19, 0) 72%);
      border:4px solid rgba(125, 11, 18, .78);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 1px 2px rgba(84,6,10,.15);
      opacity:.96;
      pointer-events:none;
    }

    .seal::after{
      content:"";
      position:absolute;
      inset:18px;
      border-radius:50%;
      border:1px solid rgba(116,8,15,.34);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.15),
        inset 0 -5px 9px rgba(61,4,8,.42);
      pointer-events:none;
    }

    .seal-ridge-1,
    .seal-ridge-2,
    .seal-ridge-3{
      position:absolute;
      border-radius:999px;
      pointer-events:none;
      opacity:.82;
      mix-blend-mode:multiply;
    }

    .seal-ridge-1{
      width:18px;
      height:10px;
      left:10px;
      top:20px;
      background:linear-gradient(180deg, rgba(120,9,15,.62), rgba(146,17,24,.18));
      transform:rotate(-26deg);
    }

    .seal-ridge-2{
      width:14px;
      height:8px;
      right:14px;
      top:28px;
      background:linear-gradient(180deg, rgba(118,8,14,.58), rgba(146,17,24,.18));
      transform:rotate(24deg);
    }

    .seal-ridge-3{
      width:16px;
      height:9px;
      right:20px;
      bottom:16px;
      background:linear-gradient(180deg, rgba(118,8,14,.58), rgba(146,17,24,.18));
      transform:rotate(-18deg);
    }

    .seal-text{
      position:relative;
      z-index:3;
      font-family:"Times New Roman", Times, serif;
      font-size:31px;
      font-weight:700;
      letter-spacing:.12em;
      color:#6c0a10;
      transform:translateY(1px);
      text-shadow:
        0 1px 0 rgba(255,255,255,.16),
        0 -1px 0 rgba(72,4,8,.86),
        1px 0 0 rgba(82,5,10,.34),
        -1px 0 0 rgba(82,5,10,.34);
      filter:drop-shadow(0 1px 0 rgba(255,255,255,.06));
    }

    .seal-text::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:78px;
      height:78px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        inset 0 -6px 10px rgba(72,4,8,.18);
      pointer-events:none;
      z-index:-1;
    }

    .video-slot, .info-slot{
      position:absolute;
      bottom:174px;
      overflow:hidden;
      border-radius:22px 22px 0 0;
      z-index:8;
      pointer-events:none;
    }

    .video-slot{
      left:50%;
      width:348px;
      height:446px;
      transform:translateX(-360px);
    }

    .info-slot{
      left:50%;
      width:236px;
      height:320px;
      transform:translateX(92px);
    }

    .video-card, .info-sheet{
      position:absolute;
      left:50%;
      bottom:-390px;
      transform:translateX(-50%);
      border-radius:24px;
      transition:
        bottom 1.12s cubic-bezier(.22,.82,.2,1),
        transform 1.12s cubic-bezier(.22,.82,.2,1),
        box-shadow 1.12s ease;
    }

    .video-card{
      width:326px;
      height:462px;
    }

    .info-sheet{
      width:220px;
      height:336px;
    }

    .video-card{
      overflow:hidden;
      background:#000;
      box-shadow:
        0 18px 34px rgba(0,0,0,.24),
        0 5px 12px rgba(0,0,0,.12);
    }

    .video-card::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.08), transparent 18%, transparent 82%, rgba(0,0,0,.10));
      pointer-events:none;
    }

    .video-card video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#000;
    }

    .info-sheet{
      background:rgba(255,252,247,.99);
      color:#111;
      box-shadow:
        0 18px 34px rgba(0,0,0,.16),
        0 5px 12px rgba(0,0,0,.10);
      padding:18px 16px 14px;
      pointer-events:auto;
      z-index:8;
    }

    .info-sheet::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.56), rgba(255,255,255,0) 24%),
        linear-gradient(90deg, rgba(0,0,0,.018), rgba(0,0,0,0) 14%, rgba(0,0,0,0) 86%, rgba(0,0,0,.018));
      pointer-events:none;
    }

    .info-title{
      position:relative;
      z-index:1;
      font-family:"Times New Roman", Times, serif;
      font-size:20px;
      letter-spacing:.06em;
      text-align:center;
      margin-bottom:12px;
      color:#111;
    }

    .info-line{
      position:relative;
      z-index:1;
      display:flex;
      align-items:flex-start;
      gap:10px;
      color:#111;
      text-decoration:none;
      font-size:13px;
      line-height:1.35;
      padding:12px 0;
      border-top:1px solid rgba(0,0,0,.10);
    }

    .info-icon{
      flex:0 0 auto;
      width:26px;
      height:26px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      margin-top:1px;
    }

    .info-copy{
      display:block;
      min-width:0;
    }

    .info-icon svg{
      width:100%;
      height:100%;
      display:block;
    }

    .info-line:first-of-type{
      border-top:none;
      padding-top:2px;
    }

    .info-label{
      display:block;
      font-weight:700;
      letter-spacing:.04em;
      margin-bottom:3px;
    }

    .info-text{
      display:block;
      opacity:.86;
    }

    .caption{
      position:absolute;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      z-index:14;
      width:90%;
      text-align:center;
      color:var(--text);
      font-size:14px;
      letter-spacing:.08em;
      text-transform:uppercase;
      text-shadow:0 4px 10px rgba(0,0,0,.24);
      opacity:0;
      transition:opacity .8s ease .3s;
    }

    .open .flap{ transform:rotateX(174deg); }
    .open .seal{
      transform:translateX(-50%) translateY(-18px) scale(.82);
      opacity:0;
    }
    .open .video-slot, .open .info-slot{ overflow:visible; }

    .open .video-card{
      bottom:76px;
      transform:translateX(-50%) translateY(-18px);
      box-shadow:
        0 28px 48px rgba(0,0,0,.25),
        0 9px 18px rgba(0,0,0,.15);
    }

    .open .info-sheet{
      bottom:56px;
      transform:translateX(-50%) translateY(-18px);
      box-shadow:
        0 26px 44px rgba(0,0,0,.18),
        0 8px 16px rgba(0,0,0,.12);
    }

    .open .caption{ opacity:1; }

    @media (max-width: 820px){
      .top .big{ font-size:32px; }

      .mail{
        width:min(99vw, 500px);
        height:364px;
        margin-bottom:14px;
      }

      .back{ inset:14px 0 0 0; border-radius:26px 26px 32px 32px; }
      .back::after{ left:24px; right:24px; height:78px; }
      .band-left{ left:54px; }
      .band-right{ right:54px; }
      .flap{ height:198px; }
      .shoulder-left, .shoulder-right{ top:30px; width:124px; height:100px; }
      .front-left, .front-right{ height:188px; }
      .front-center{ height:158px; }

      .seal{
        top:128px;
        width:92px;
        height:92px;
      }
      .seal-text{ font-size:27px; }
      .seal-ridge-1{ width:15px; height:8px; left:8px; top:16px; }
      .seal-ridge-2{ width:12px; height:7px; right:10px; top:24px; }
      .seal-ridge-3{ width:13px; height:8px; right:14px; bottom:12px; }

      .video-slot, .info-slot{
        bottom:138px;
        z-index:8;
      }

      .video-slot{
        width:232px;
        height:322px;
        transform:translateX(-228px);
      }

      .info-slot{
        width:156px;
        height:234px;
        transform:translateX(20px);
      }

      .video-card{
        width:216px;
        height:338px;
      }

      .info-sheet{
        width:144px;
        height:248px;
        padding:14px 10px 10px;
      }

      .info-title{ font-size:15px; margin-bottom:10px; }
      .info-line{ font-size:11px; padding:9px 0; gap:8px; }
      .info-icon{ width:22px; height:22px; }
      .open .video-card{ bottom:48px; }
      .open .info-sheet{ bottom:38px; }
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="bg">
      <img src="fondo.jpg" alt="Foto de la pareja" />
    </div>

    <div class="overlay"></div>

    <div class="top">
      <div class="small">Toca el sobre</div>
      <div class="big">A &amp; L</div>
    </div>

    <div class="mail">
      <div class="mail-glow"></div>
      <div class="envelope">
        <div class="back"></div>
        <div class="band-left"></div>
        <div class="band-right"></div>

        <div class="video-slot">
          <div class="video-card">
            <video id="inviteVideo" playsinline preload="auto" loop poster="poster.jpg">
              <source src="video.mp4" type="video/mp4">
            </video>
          </div>
        </div>

        <div class="info-slot">
          <div class="info-sheet">
            <div class="info-title">Detalles</div>
            <a class="info-line" href="https://maps.app.goo.gl/BxDHraC2w1GPPhbA7" target="_blank" rel="noopener noreferrer">
              <span class="info-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                  <path d="M32 6c-10.5 0-19 8.2-19 18.3 0 14.6 19 33.7 19 33.7s19-19.1 19-33.7C51 14.2 42.5 6 32 6Z" fill="#34A853"/>
                  <path d="M32 13c-6.7 0-12.2 5.1-12.2 11.4 0 9.2 12.2 21.5 12.2 21.5s12.2-12.3 12.2-21.5C44.2 18.1 38.7 13 32 13Z" fill="#EA4335"/>
                  <circle cx="32" cy="24" r="7.5" fill="#4285F4"/>
                  <circle cx="32" cy="24" r="3.4" fill="#FBBC05"/>
                </svg>
              </span>
              <span class="info-copy">
                <span class="info-label">Ubicación</span>
                <span class="info-text">Ver en Google Maps</span>
              </span>
            </a>
            <a class="info-line" href="https://wa.me/573116038317" target="_blank" rel="noopener noreferrer">
              <span class="info-icon" aria-hidden="true">
                <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="32" cy="32" r="30" fill="#25D366"/>
                  <path d="M20.2 49.5l2.4-8.7a16.8 16.8 0 1 1 6.2 5.8l-8.6 2.9Z" fill="#25D366" stroke="#fff" stroke-width="2.6" stroke-linejoin="round"/>
                  <path d="M26.9 22.9c.7-1.6 1.4-1.7 2.1-1.7.5 0 1 0 1.5.1.4 0 1 .2 1.5 1.1.5 1 .9 2.4 1 2.6.1.2.2.7 0 1.1-.2.4-.3.6-.7 1-.3.4-.6.8-.9 1.1-.3.3-.6.6-.2 1.2.4.7 1.8 2.9 4.4 4.6 3.3 2.2 4.5 1.9 5.3 1.6.8-.3 2.6-3 3.1-3.7.5-.8 1.1-.6 1.9-.3.8.3 4.8 2.3 5.6 2.8.8.4 1.3.6 1.5 1 .2.4.2 2.2-.5 4.3-.7 2-3.9 3.9-5.3 4.2-1.3.3-3 .4-8.7-2-6.9-3-11.4-10.5-11.8-11.1-.4-.6-2.8-3.8-2.8-7.2 0-3.4 1.8-5.1 2.4-5.9Z" fill="#fff"/>
                </svg>
              </span>
              <span class="info-copy">
                <span class="info-label">Asistiré</span>
                <span class="info-text">WhatsApp +57 311 6038317</span>
              </span>
            </a>
          </div>
        </div>

        <div class="flap"></div>
        <div class="shoulder-left"></div>
        <div class="shoulder-right"></div>
        <div class="front-left"></div>
        <div class="front-right"></div>
        <div class="front-center"></div>
        <div class="seal"><span class="seal-ridge-1"></span><span class="seal-ridge-2"></span><span class="seal-ridge-3"></span><span class="seal-text">A&nbsp;L</span></div>
      </div>
    </div>

    <div class="caption">Nuestra historia comienza aquí</div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const inviteVideo = document.getElementById('inviteVideo');

    scene.addEventListener('click', () => {
      const isOpening = !scene.classList.contains('open');
      scene.classList.toggle('open');

      if (isOpening) {
        inviteVideo.currentTime = 0;
        inviteVideo.muted = false;
        inviteVideo.volume = 1;
        const playAttempt = inviteVideo.play();
        if (playAttempt && typeof playAttempt.catch === 'function') {
          playAttempt.catch(() => {});
        }
      } else {
        inviteVideo.pause();
        inviteVideo.currentTime = 0;
      }
    });
  </script>
</body>
</html>
