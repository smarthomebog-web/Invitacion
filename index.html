<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitación A & L</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root{
      --paper-1:#fffdfa;
      --paper-2:#f6efe6;
      --paper-3:#ece0d0;
      --paper-4:#e2d2bf;
      --wine-1:#b5232f;
      --wine-2:#941a25;
      --wine-3:#74121b;
      --gold-1:#ead6ab;
      --gold-2:#c9a86b;
      --gold-3:#9d7433;
      --shadow: rgba(28,16,13,.30);
      --text: #fff8f1;
    }

    html, body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family: Arial, sans-serif;
      background:#1a120f;
    }

    .scene{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      perspective:2200px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      background:#1a120f;
    }

    .bg, .overlay{
      position:absolute;
      inset:0;
    }

    .bg{
      z-index:1;
      background:#1a120f;
      overflow:hidden;
    }

    .bg-fill, .bg-main{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
    }

    .bg-fill{
      object-fit:cover;
      transform:scale(1.10);
      filter:blur(18px) brightness(.55) saturate(.96);
    }

    .bg-main{
      object-fit:contain;
      object-position:center center;
      transform:scale(.98);
    }

    .overlay{
      z-index:2;
      background:
        linear-gradient(180deg, rgba(255,248,241,.06) 0%, rgba(255,248,241,.02) 28%, rgba(19,10,8,.12) 100%),
        radial-gradient(circle at top, rgba(255,255,255,.10), transparent 26%);
      pointer-events:none;
    }

    .top{
      position:absolute;
      top:22px;
      left:50%;
      transform:translateX(-50%);
      z-index:20;
      width:min(92vw, 560px);
      text-align:center;
      color:var(--text);
      text-shadow:0 4px 14px rgba(0,0,0,.28);
    }

    .top .small{
      font-size:12px;
      letter-spacing:.26em;
      text-transform:uppercase;
      margin-bottom:10px;
      opacity:.92;
      color:#111;
      text-shadow:0 1px 4px rgba(255,255,255,.18);
    }

    .top .big{
      font-family:"Times New Roman", Times, serif;
      font-size:38px;
      letter-spacing:.18em;
    }

    .mail{
      position:relative;
      z-index:10;
      width:min(78vw, 400px);
      height:290px;
      margin-bottom:34px;
      filter:drop-shadow(0 24px 30px var(--shadow));
    }

    .mail-glow{
      position:absolute;
      left:50%;
      bottom:-16px;
      transform:translateX(-50%);
      width:88%;
      height:58px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,239,215,.42), rgba(255,239,215,0) 74%);
      filter:blur(20px);
      opacity:.82;
    }

    .envelope{
      position:absolute;
      inset:0;
    }

    .back{
      position:absolute;
      inset:12px 0 0 0;
      border-radius:22px 22px 28px 28px;
      overflow:hidden;
      z-index:1;
      background:linear-gradient(180deg, var(--paper-1), var(--paper-2) 48%, var(--paper-3) 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.80),
        inset 0 -12px 16px rgba(163,133,98,.18);
    }

    .back::before{
      content:"";
      position:absolute;
      inset:18px 18px 18px 18px;
      border-radius:28px 28px 36px 36px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,.06) 42%, rgba(0,0,0,.02)),
        linear-gradient(90deg, rgba(255,255,255,.14), rgba(255,255,255,0) 16%, rgba(255,255,255,0) 84%, rgba(255,255,255,.10));
      box-shadow: inset 0 0 0 1px rgba(214,191,154,.55);
    }

    .back::after{
      content:"";
      position:absolute;
      left:18px;
      right:18px;
      top:20px;
      height:58px;
      border-radius:22px 22px 0 0;
      background:linear-gradient(180deg, rgba(255,255,255,.48), rgba(255,255,255,0));
      pointer-events:none;
    }

    .band-left, .band-right{
      position:absolute;
      top:52px;
      bottom:34px;
      width:14px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.02)),
                 linear-gradient(180deg, #caa96a, #b58c4a 50%, #8f672e);
      z-index:8;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.35),
        0 0 0 1px rgba(123,89,40,.08);
      opacity:.85;
    }

    .band-left{ left:38px; }
    .band-right{ right:38px; }

    .flap{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:156px;
      clip-path:polygon(0 0, 50% 100%, 100% 0);
      background:
        linear-gradient(180deg, var(--paper-1), #f4ebdf 52%, #e8d9c5 100%);
      transform-origin:top center;
      transition:transform 1s cubic-bezier(.22,.8,.2,1);
      z-index:11;
      backface-visibility:hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.82),
        0 8px 16px rgba(0,0,0,.06);
    }

    .flap::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,0) 28%),
        linear-gradient(90deg, rgba(212,187,146,.18), rgba(212,187,146,0) 18%, rgba(212,187,146,0) 82%, rgba(212,187,146,.18));
      pointer-events:none;
    }

    .shoulder-left, .shoulder-right, .front-left, .front-right, .front-center{
      position:absolute;
      bottom:0;
    }

    .shoulder-left, .shoulder-right{
      top:22px;
      width:90px;
      height:72px;
      background:linear-gradient(180deg, #f9f3eb, #efdfcb);
      z-index:2;
    }

    .shoulder-left{
      left:0;
      clip-path:polygon(0 0, 100% 0, 44% 100%, 0 100%);
      border-top-left-radius:30px;
    }

    .shoulder-right{
      right:0;
      clip-path:polygon(0 0, 100% 0, 100% 100%, 56% 100%);
      border-top-right-radius:30px;
    }

    .front-left{
      left:0;
      width:50%;
      height:148px;
      clip-path:polygon(0 0, 100% 100%, 0 100%);
      background:linear-gradient(180deg, var(--paper-1), #ecddcb 100%);
      border-bottom-left-radius:42px;
      z-index:4;
    }

    .front-right{
      right:0;
      width:50%;
      height:148px;
      clip-path:polygon(100% 0, 100% 100%, 0 100%);
      background:linear-gradient(180deg, #faf4ec, #e7d7c4 100%);
      border-bottom-right-radius:42px;
      z-index:4;
    }

    .front-center{
      left:0;
      right:0;
      height:124px;
      clip-path:polygon(0 0, 50% 78%, 100% 0, 100% 100%, 0 100%);
      background:linear-gradient(180deg, #fffdfa, #efe1cf 100%);
      border-bottom-left-radius:42px;
      border-bottom-right-radius:42px;
      z-index:7;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.88),
        inset 0 -8px 12px rgba(189,160,124,.10);
    }

    .seal{
      position:absolute;
      left:50%;
      top:98px;
      transform:translateX(-50%) rotate(-2deg);
      width:66px;
      height:66px;
      border-radius:44% 56% 50% 50% / 49% 45% 55% 51%;
      z-index:13;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 26% 22%, rgba(255,255,255,.46), rgba(255,255,255,0) 14%),
        radial-gradient(circle at 38% 34%, rgba(255,176,176,.14), rgba(255,176,176,0) 18%),
        radial-gradient(circle at 72% 76%, rgba(72,4,9,.62), rgba(72,4,9,0) 30%),
        radial-gradient(circle at 50% 46%, #d32a34 0%, #bc1d29 36%, #a61420 58%, #8a0f18 78%, #6d0910 100%);
      border:2px solid rgba(102, 7, 13, .82);
      box-shadow:
        0 18px 32px rgba(86,8,14,.46),
        0 4px 10px rgba(0,0,0,.12),
        inset 0 3px 4px rgba(255,255,255,.24),
        inset 0 -12px 18px rgba(83,7,12,.48);
      transition:transform .7s ease, opacity .45s ease;
      overflow:visible;
    }

    .seal::before{
      content:"";
      position:absolute;
      inset:-6px;
      border-radius:46% 54% 48% 52% / 45% 49% 51% 55%;
      background:
        radial-gradient(circle at 50% 50%, rgba(126, 12, 19, .10), rgba(126, 12, 19, 0) 72%);
      border:4px solid rgba(125, 11, 18, .78);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 1px 2px rgba(84,6,10,.15);
      opacity:.96;
      pointer-events:none;
    }

    .seal::after{
      content:"";
      position:absolute;
      inset:18px;
      border-radius:50%;
      border:1px solid rgba(116,8,15,.34);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.15),
        inset 0 -5px 9px rgba(61,4,8,.42);
      pointer-events:none;
    }

    .seal-ridge-1,
    .seal-ridge-2,
    .seal-ridge-3{
      position:absolute;
      border-radius:999px;
      pointer-events:none;
      opacity:.82;
      mix-blend-mode:multiply;
    }

    .seal-ridge-1{
      width:18px;
      height:10px;
      left:10px;
      top:20px;
      background:linear-gradient(180deg, rgba(120,9,15,.62), rgba(146,17,24,.18));
      transform:rotate(-26deg);
    }

    .seal-ridge-2{
      width:14px;
      height:8px;
      right:14px;
      top:22px;
      background:linear-gradient(180deg, rgba(118,8,14,.58), rgba(146,17,24,.18));
      transform:rotate(24deg);
    }

    .seal-ridge-3{
      width:16px;
      height:9px;
      right:20px;
      bottom:16px;
      background:linear-gradient(180deg, rgba(118,8,14,.58), rgba(146,17,24,.18));
      transform:rotate(-18deg);
    }

    .seal-text{
      position:relative;
      z-index:3;
      font-family:"Times New Roman", Times, serif;
      font-size:26px;
      font-weight:700;
      letter-spacing:.12em;
      color:#6c0a10;
      transform:translateY(1px);
      text-shadow:
        0 1px 0 rgba(255,255,255,.16),
        0 -1px 0 rgba(72,4,8,.86),
        1px 0 0 rgba(82,5,10,.34),
        -1px 0 0 rgba(82,5,10,.34);
      filter:drop-shadow(0 1px 0 rgba(255,255,255,.06));
    }

    .seal-text::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      width:78px;
      height:78px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        inset 0 -6px 10px rgba(72,4,8,.18);
      pointer-events:none;
      z-index:-1;
    }

    
    /* Insert content clipped inside the envelope */
    .insert-mouth{
      position:absolute;
      left:50%;
      bottom:94px;
      width:206px;
      height:160px;
      transform:translateX(-50%);
      overflow:hidden;
      border-radius:16px 16px 0 0;
      z-index:6;
      pointer-events:none;
    }

    .insert-row{
      position:absolute;
      left:50%;
      bottom:-160px;
      width:194px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      gap:8px;
      transform:translateX(-50%);
      transition:
        bottom 1.08s cubic-bezier(.22,.82,.2,1),
        transform 1.08s cubic-bezier(.22,.82,.2,1);
      pointer-events:none;
    }

    .video-card{
      width:120px;
      height:184px;
      border-radius:12px;
      overflow:hidden;
      background:#000;
      box-shadow:
        0 10px 18px rgba(0,0,0,.18),
        0 4px 10px rgba(0,0,0,.10);
      position:relative;
      pointer-events:auto;
    }

    .video-card::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,.08), transparent 18%, transparent 82%, rgba(0,0,0,.10));
      pointer-events:none;
    }

    .video-card video{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center top;
      display:block;
      background:#000;
    }

    .info-sheet{
      width:66px;
      height:116px;
      border-radius:10px;
      background:rgba(255,252,247,.99);
      color:#111;
      box-shadow:
        0 8px 12px rgba(0,0,0,.11),
        0 3px 6px rgba(0,0,0,.06);
      padding:5px 4px 3px;
      pointer-events:auto;
      z-index:8;
    }

    .info-title{
      font-family:"Times New Roman", Times, serif;
      font-size:8px;
      text-align:center;
      margin-bottom:3px;
      color:#111;
    }

    .info-line{
      display:flex;
      align-items:flex-start;
      gap:3px;
      color:#111;
      text-decoration:none;
      font-size:6px;
      line-height:1.05;
      padding:2px 0;
      border-top:1px solid rgba(0,0,0,.10);
    }

    .info-line:first-of-type{
      border-top:none;
      padding-top:1px;
    }

    .info-icon{
      flex:0 0 auto;
      width:9px;
      height:9px;
      display:inline-flex;
      margin-top:1px;
    }

    .info-copy{ display:block; min-width:0; }
    .info-icon svg{ width:100%; height:100%; display:block; }

    .info-label{
      display:block;
      font-weight:700;
      margin-bottom:1px;
    }

    .info-text{
      display:block;
      opacity:.86;
    }

    .caption{
      position:absolute;
      left:50%;
      bottom:14px;
      transform:translateX(-50%);
      z-index:14;
      width:90%;
      text-align:center;
      color:var(--text);
      font-size:14px;
      letter-spacing:.08em;
      text-transform:uppercase;
      text-shadow:0 4px 10px rgba(0,0,0,.24);
      opacity:0;
      transition:opacity .8s ease .3s;
    }

    .open .flap{ transform:rotateX(174deg); }
    .open .seal{
      transform:translateX(-50%) translateY(-14px) scale(.82);
      opacity:0;
    }
    .open .insert-mouth{ overflow:visible; }
    .open .insert-row{
      bottom:10px;
      transform:translateX(-50%) translateY(-8px);
    }
    .open .caption{ opacity:1; }


    @media (max-width: 820px){
      .top .big{ font-size:28px; }

      .mail{
        width:min(78vw, 326px);
        height:252px;
        margin-bottom:42px;
      }

      .mail-glow{
        width:78%;
        height:50px;
      }

      .back{ inset:10px 0 0 0; border-radius:20px 20px 25px 25px; }
      .back::before{ inset:12px 12px 14px 12px; border-radius:16px 16px 20px 20px; }
      .back::after{ left:14px; right:14px; height:48px; }

      .band-left{ left:28px; width:9px; top:32px; bottom:24px; }
      .band-right{ right:28px; width:9px; top:32px; bottom:24px; }

      .flap{ height:138px; }
      .shoulder-left, .shoulder-right{ top:18px; width:74px; height:58px; }
      .front-left, .front-right{ height:132px; }
      .front-center{ height:110px; }

      .seal{
        top:88px;
        width:58px;
        height:58px;
      }
      .seal-text{ font-size:18px; }
      .seal-ridge-1{ width:10px; height:5px; left:6px; top:10px; }
      .seal-ridge-2{ width:8px; height:5px; right:7px; top:15px; }
      .seal-ridge-3{ width:8px; height:5px; right:9px; bottom:7px; }

      .insert-mouth{
        bottom:92px;
        width:238px;
        height:220px;
      }

      .insert-row{
        width:100%;
        bottom:-232px;
      }

      .video-card{
        width:170px;
        height:264px;
      }

      .link-bar{
        width:92%;
        bottom:8px;
        gap:6px;
      }

      .link-chip{
        padding:8px 8px;
        border-radius:12px;
        gap:6px;
      }

      .chip-icon{ width:17px; height:17px; }
      .chip-label{ font-size:9.5px; }
      .chip-text{ font-size:7.5px; }

      .open .insert-row{ bottom:18px; }
    }
  
    body.intro-active .scene{
      pointer-events:none;
    }

    .intro-screen{
      position:fixed;
      inset:0;
      z-index:60;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      background:#efe7d9;
      transition:opacity .7s ease, visibility .7s ease;
    }

    .intro-screen.is-hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .intro-card{
      position:relative;
      width:min(100%, 390px);
      min-height:690px;
      border-radius:0;
      background:#efe7d9 url("portada_fondo_correcto.png") center/cover no-repeat;
      overflow:hidden;
      color:#6a5649
      box-shadow:0 10px 32px rgba(0,0,0,.08);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding:22px 22px 32px;
      text-align:center;
    }

    .intro-card,
    .intro-card *{
      font-family:"Times New Roman", Times, serif;
    }

    .intro-card::before,
    .intro-card::after{
      content:"";
      position:absolute;
      inset:auto auto 0 0;
      width:120px;
      height:120px;
      pointer-events:none;
      opacity:0;
      background:
        radial-gradient(circle at 30% 30%, #eadfce 0 20%, transparent 21%),
        radial-gradient(circle at 62% 42%, #dcc7ae 0 18%, transparent 19%),
        radial-gradient(circle at 48% 72%, #e8d7c4 0 17%, transparent 18%);
      filter:blur(.2px);
    }

    .intro-card .intro-overlay{
      position:absolute;
      inset:0;
      background:rgba(255,255,255,0);
      pointer-events:none;
    }

    .intro-card::before{
      top:0;
      right:0;
      left:auto;
      bottom:auto;
      transform:translate(16px,-10px) scale(1.15);
      border-radius:0 0 0 120px;
    }

    .intro-card::after{
      left:auto;
      right:-14px;
      bottom:-8px;
      transform:scale(1.5);
      border-radius:120px 0 0 0;
    }

    .intro-subtitle{
      font-size:13px;
      letter-spacing:.12em;
      text-transform:uppercase;
      line-height:1.45;
      margin-top:2px;
      margin-bottom:36px;
      color:#6a5649
      font-style:normal;
    }

    .intro-name{
      display:none;
    }

    .intro-guest-space{
      width:min(100%, 300px);
      height:76px;
      margin-bottom:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .guest-line{
      display:block;
      width:100%;
      border-bottom:1.8px solid rgba(106,86,73,.34);
      position:relative;
    }

    .guest-line::before,
    .guest-line::after{
      box-shadow:0 0 0 1px rgba(193,153,97,.14);
    }

    .guest-line::before,
    .guest-line::after{
      content:"";
      position:absolute;
      top:50%;
      width:14px;
      height:14px;
      border:1.5px solid rgba(200,154,88,.55);
      border-radius:50%;
      background:rgba(253,250,244,.96);
      transform:translateY(-50%);
    }

    .guest-line::before{ left:-4px; }
    .guest-line::after{ right:-4px; }

    .intro-reserved{
      font-family:"Times New Roman", Times, serif;
      font-size:13px;
      letter-spacing:.15em;
      text-transform:uppercase;
      line-height:1.5;
      color:#6a5649
      display:flex;
      align-items:flex-end;
      justify-content:center;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:52px;
    }

    .intro-reserved .big-number{
      font-size:54px;
      line-height:.85;
      color:#c19961
      font-weight:400;
      letter-spacing:0;
      margin:0 2px;
    }

    .intro-month{
      font-size:40px;
      letter-spacing:.02em;
      text-transform:uppercase;
      color:#6a5649
      margin-bottom:16px;
      font-weight:400;
    }

    .intro-date-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      width:100%;
      margin-bottom:14px;
    }

    .intro-side{
      flex:1;
      max-width:112px;
      position:relative;
      font-size:14px;
      letter-spacing:.03em;
      text-transform:none;
      color:#6a5649
      line-height:1.3;
      padding-top:10px;
      padding-bottom:10px;
      font-weight:400;
    }

    .intro-side::before,
    .intro-side::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      height:1px;
      background:rgba(109,90,84,.45);
    }

    .intro-side::before{ top:0; }
    .intro-side::after{ bottom:0; }

    .intro-day{
      font-size:64px;
      line-height:.88;
      color:#c3985a;
      min-width:62px;
      font-weight:400;
    }

    .intro-year{
      font-size:20px;
      letter-spacing:.06em;
      text-transform:none;
      color:#6a5649
      margin-bottom:30px;
      font-weight:400;
    }

    .bird-trigger{
      margin-top:auto;
      width:100%;
      display:flex;
      justify-content:center;
      background:none;
      border:none;
      cursor:pointer;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    .bird-pill{
      width:min(100%, 180px);

  <script>
    const scene = document.getElementById('scene');
    const inviteVideo = document.getElementById('inviteVideo');
    const introScreen = document.getElementById('introScreen');
    const birdTrigger = document.getElementById('birdTrigger');
    const guestName = document.getElementById('guestName');

    const params = new URLSearchParams(window.location.search);
    const invitedName = params.get('invitado') || params.get('nombre');

    if (invitedName && guestName) {
      guestName.textContent = invitedName;
    }

    birdTrigger.addEventListener('click', (event) => {
      event.stopPropagation();
      introScreen.classList.add('is-hidden');
      document.body.classList.remove('intro-active');
    });

    inviteVideo.addEventListener('ended', () => {
      scene.classList.add('final-state');
    });

    scene.addEventListener('click', () => {
      if (document.body.classList.contains('intro-active')) return;

      if (scene.classList.contains('final-state')) {
        scene.classList.remove('final-state');
        scene.classList.remove('open');
        inviteVideo.pause();
        inviteVideo.currentTime = 0;
        return;
      }

      const isOpening = !scene.classList.contains('open');
      scene.classList.toggle('open');

      if (isOpening) {
        scene.classList.remove('final-state');
        inviteVideo.currentTime = 0;
        inviteVideo.muted = false;
        inviteVideo.volume = 1;
        const playAttempt = inviteVideo.play();
        if (playAttempt && typeof playAttempt.catch === 'function') {
          playAttempt.catch(() => {});
        }
      } else {
        inviteVideo.pause();
        inviteVideo.currentTime = 0;
      }
    });
  </script>
